<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venu weds Sowmya 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  color:#fff;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

/* 🔥 BACKGROUND */
.bg-fixed{
  position:fixed;
  inset:0;
  background:url("background.jpg") center top / cover no-repeat;
  z-index:-2;
}

.bg-fixed::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
}

/* ☰ MENU BUTTON */
.menu-btn{
  position:fixed;
  top:15px;
  right:15px;
  background:#ffd700;
  color:#000;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  z-index:1000;
}

/* SIDE MENU */
.side-menu{
  position:fixed;
  top:0;
  right:-100%;
  width:260px;
  height:100%;
  background:rgba(0,0,0,0.9);
  backdrop-filter:blur(10px);
  transition:0.4s;
  padding:20px;
  z-index:1000;
}

.side-menu.active{right:0;}

.side-menu h3{
  margin-bottom:15px;
}

.side-menu button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#ffd700;
  color:#000;
  font-weight:bold;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

/* TITLE */
.top-names{
  margin-top:40px;
  text-align:center;
  padding:15px 25px;
  border-radius:15px;
  background:rgba(255,215,0,0.15);
  backdrop-filter:blur(6px);
}

.names{
  font-family:'Playfair Display', serif;
  font-size:2rem;
  background:linear-gradient(135deg,#ffd700,#fff,#ffd700);
  -webkit-background-clip:text;
  color:transparent;
}

.tagline{font-size:12px;margin-top:5px;}

/* CONTENT */
.content{
  padding:20px;
  text-align:center;
}

/* CARD */
.card{
  padding:18px;
  border-radius:18px;
  background:rgba(255,215,0,0.12);
  backdrop-filter:blur(6px);
}

.details{line-height:1.8;}

.countdown{margin-top:12px;}

/* BUTTONS */
.actions{
  margin-top:15px;
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#ffd700;
  color:#000;
}

/* 🎥 MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  z-index:2000;
  justify-content:center;
  align-items:center;
}

.modal img{
  width:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="bg-fixed"></div>

<!-- ☰ MENU -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="side-menu" id="menu">
  <h3>Wedding Events</h3>
  <button onclick="openGallery('haldi')">Haldi</button>
  <button onclick="openGallery('reception')">Reception</button>
</div>

<!-- HERO -->
<div class="hero">
  <div class="top-names">
    <div class="names">Venu weds Sowmya</div>
    <div class="tagline">Together with love & blessings</div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="card">
    <div class="details">
      📍 Thotapally<br>
      🗓 Sunday, May 10, 2026<br>
      ⏰ Muhurtham: 10:25 AM<br>
      ✨ Wedding Ceremony
    </div>

    <div class="countdown" id="countdown"></div>
  </div>

  <div class="actions">
    <button class="btn" onclick="openMap()">📍 Location</button>
    <button class="btn" onclick="shareWA()">📤 Share</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>
/* MENU */
function toggleMenu(){
 document.getElementById("menu").classList.toggle("active");
}

/* GALLERY DATA */
const galleries={
 haldi:["haldi1.jpg","haldi2.jpg"],
 reception:["rec1.jpg","rec2.jpg"]
};

/* OPEN GALLERY */
function openGallery(type){
 let img=document.getElementById("modalImg");
 img.src=galleries[type][0];
 document.getElementById("modal").style.display="flex";
}

/* CLOSE */
function closeModal(){
 document.getElementById("modal").style.display="none";
}

/* COUNTDOWN */
let target=new Date("May 10, 2026 10:25:00").getTime();
setInterval(()=>{
 let d=target-Date.now();
 let days=Math.floor(d/(1000*60*60*24));
 let hrs=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let min=Math.floor((d%(1000*60*60))/(1000*60));
 document.getElementById("countdown").innerHTML=`⏳ ${days}d ${hrs}h ${min}m`;
},1000);

/* ACTIONS */
function openMap(){
 window.open("https://maps.app.goo.gl/e5nKVW6cyCUn4xvr6?g_st=aw");
}

function shareWA(){
 window.open(`https://wa.me/?text=${encodeURIComponent(window.location.href)}`);
}
</script>

</body>
</html>
