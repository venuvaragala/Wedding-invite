<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venu weds Sowmya 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 🎥 HERO SECTION */
.hero{
  height:100vh;
  width:100%;
  position:relative;
  background:url("background.jpg") center top / cover no-repeat;
  display:flex;
  align-items:flex-start;
  justify-content:center;
}

/* 🌫 CINEMATIC OVERLAY */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
}

/* ✨ TOP GLASS TITLE */
.top-names{
  position:relative;
  margin-top:50px;
  z-index:2;
  text-align:center;
  padding:18px 28px;
  border-radius:18px;

  background:linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
  backdrop-filter: blur(12px);

  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  animation:fadeUp 1.2s ease;
}

.names{
  font-family:'Playfair Display', serif;
  font-size:2.2rem;
  letter-spacing:2px;

  background:linear-gradient(135deg,#fff,#ffd1dc,#fff);
  background-size:200%;
  -webkit-background-clip:text;
  color:transparent;

  animation:shine 6s linear infinite;
}

.tagline{
  margin-top:6px;
  font-size:12px;
  opacity:0.8;
}

/* 📦 CONTENT */
.content{
  padding:25px 18px 40px;
  text-align:center;
  background:linear-gradient(to bottom, transparent, #000);
  margin-top:-60px;
  border-radius:20px 20px 0 0;
}

/* 💍 DETAILS CARD */
.card{
  padding:20px;
  border-radius:20px;

  background:linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
  backdrop-filter: blur(12px);

  box-shadow:0 10px 40px rgba(0,0,0,0.4);

  animation:fadeUp 1.2s ease;
}

.details{
  font-size:15px;
  line-height:1.8;
}

/* ⏳ COUNTDOWN */
.countdown{
  margin-top:15px;
  font-size:14px;
  opacity:0.9;
}

/* 🔘 BUTTONS */
.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
  font-size:14px;
  font-weight:600;
  cursor:pointer;

  color:#fff;
  background:linear-gradient(135deg,#ff7eb3,#65d6ff);

  transition:0.3s;
}

.btn:active{
  transform:scale(0.95);
}

/* ✨ ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes shine{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

/* 📱 RESPONSIVE */
@media (max-width:768px){
  .names{font-size:2rem;}
}
</style>
</head>

<body>

<!-- 🎥 HERO -->
<div class="hero">
  <div class="top-names">
    <div class="names">Venu weds Sowmya</div>
    <div class="tagline">Together with love & blessings</div>
  </div>
</div>

<!-- 📦 CONTENT -->
<div class="content">

  <div class="card">
    <div class="details">
      📍 Thotapally<br>
      🗓 Sunday, May 10, 2026<br>
      ⏰ Muhurtham: 10:25 AM<br>
      ✨ Wedding Ceremony
    </div>

    <div class="countdown" id="countdown"></div>
  </div>

  <div class="actions">
    <button class="btn" onclick="openMap()">📍 Location</button>
    <button class="btn" onclick="shareWA()">📤 Share</button>
  </div>

</div>

<script>
// countdown
let target=new Date("May 10, 2026 10:25:00").getTime();
setInterval(()=>{
 let d=target-Date.now();
 let days=Math.floor(d/(1000*60*60*24));
 let hrs=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let min=Math.floor((d%(1000*60*60))/(1000*60));
 document.getElementById("countdown").innerHTML=`⏳ ${days}d ${hrs}h ${min}m left`;
},1000);

// actions
function openMap(){
 window.open("https://maps.app.goo.gl/e5nKVW6cyCUn4xvr6?g_st=aw");
}

function shareWA(){
 window.open(`https://wa.me/?text=${encodeURIComponent(window.location.href)}`);
}
</script>

</body>
</html>
