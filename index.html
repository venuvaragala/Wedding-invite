<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Venu weds Sowmya 💍</title>

<!-- WhatsApp Preview -->
<meta property="og:title" content="Venu weds Sowmya Wedding 💍">
<meta property="og:description" content="Join us on May 10, 2026 ❤️">
<meta property="og:image" content="https://venuvaragala.github.io/Wedding-invite/preview.jpg">
<meta property="og:url" content="https://venuvaragala.github.io/Wedding-invite/">
<meta property="og:type" content="website">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 -webkit-user-select:none;
 user-select:none;
}

body{
 font-family:'Inter',sans-serif;
 background:url("background.jpg") center/cover no-repeat fixed;
 color:#fff;
 overflow:hidden;
}

/* Overlay */
.overlay{
 position:fixed;
 width:100%;
 height:100%;
 background:radial-gradient(circle, rgba(255,255,255,0.05), rgba(0,0,0,0.9));
 z-index:-1;
}

/* Petals */
.petal{
 position:fixed;
 top:-10px;
 width:8px;
 height:8px;
 background:#ffb6c1;
 border-radius:50%;
 animation:fall linear infinite;
}
@keyframes fall{
 to{transform:translateY(110vh);opacity:0;}
}

/* Glass UI */
.glass{
 backdrop-filter:blur(12px);
 background:rgba(255,255,255,0.08);
 border-radius:18px;
 padding:20px;
 box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

/* Title */
.title{
 font-family:'Playfair Display',serif;
 font-size:2.6rem;
 text-align:center;
 margin-top:50px;
 letter-spacing:2px;
}

/* Panels */
.left{
 position:absolute;
 left:5%;
 top:50%;
 transform:translateY(-50%);
}

.right{
 position:absolute;
 right:5%;
 top:50%;
 transform:translateY(-50%);
 display:flex;
 flex-direction:column;
 gap:12px;
}

/* Buttons */
.btn{
 padding:12px 15px;
 border:none;
 border-radius:25px;
 background:rgba(255,255,255,0.15);
 color:#fff;
 cursor:pointer;
 font-weight:600;
 transition:0.3s;
}

.btn:hover{
 background:linear-gradient(135deg,#ff7eb3,#65d6ff);
 color:#000;
 transform:scale(1.05);
}

/* Mobile */
@media(max-width:768px){
 .left,.right{
  position:static;
  transform:none;
  margin:10px auto;
  width:90%;
 }
 .right{
  flex-direction:row;
  justify-content:center;
 }
}
</style>
</head>

<body oncontextmenu="return false">

<div class="overlay"></div>

<div class="title">Venu weds Sowmya</div>

<div class="left glass">
📍 Thotapally<br><br>
🗓 Sunday, May 10, 2026<br><br>
⏰ Muhurtham: 10:25 AM
</div>

<div class="right glass">
<button class="btn" onclick="openMap()">📍 Location</button>
<button class="btn" onclick="shareWA()">📤 Share</button>
</div>

<script>
// Petals animation
for(let i=0;i<15;i++){
 let p=document.createElement('div');
 p.className='petal';
 p.style.left=Math.random()*100+'vw';
 p.style.animationDuration=(5+Math.random()*5)+'s';
 document.body.appendChild(p);
}

// Open map
function openMap(){
 window.open("https://maps.app.goo.gl/e5nKVW6cyCUn4xvr6","_blank");
}

// WhatsApp share
function shareWA(){
 let text="You're invited 💍\\n"+window.location.href;
 window.open("https://wa.me/?text="+encodeURIComponent(text));
}

// Disable shortcuts
document.addEventListener('keydown',function(e){
 if(e.ctrlKey && ['u','c','x','s','a'].includes(e.key.toLowerCase())){
   e.preventDefault();
 }
});
</script>

</body>
</html>
