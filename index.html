<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venu weds Sowmya 💍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  color:#fff;
  overflow-x:hidden;
}

/* 🔥 FIXED BACKGROUND */
.bg-fixed{
  position:fixed;
  inset:0;
  background:url("background.jpg") center top / cover no-repeat;
  z-index:-2;
}

/* 🌫 GOLD OVERLAY */
.bg-fixed::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(255,215,0,0.15), rgba(0,0,0,0.9));
}

/* 🎥 HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

/* 💎 GOLD GLASS TITLE */
.top-names{
  margin-top:50px;
  text-align:center;
  padding:18px 28px;
  border-radius:20px;

  background:linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,255,255,0.05));
  backdrop-filter:blur(14px);

  border:1px solid rgba(255,215,0,0.4);
  box-shadow:0 10px 40px rgba(255,215,0,0.2);

  animation:fadeUp 1.2s ease;
}

.names{
  font-family:'Playfair Display', serif;
  font-size:2.3rem;

  background:linear-gradient(135deg,#ffd700,#fff,#ffd700);
  background-size:200%;
  -webkit-background-clip:text;
  color:transparent;

  text-shadow:0 4px 20px rgba(255,215,0,0.5);
  animation:shine 6s linear infinite;
}

.tagline{
  margin-top:6px;
  font-size:12px;
  opacity:0.85;
}

/* 📦 CONTENT */
.content{
  padding:25px 18px 50px;
  text-align:center;
}

/* 💍 GOLD CARD */
.card{
  padding:22px;
  border-radius:22px;

  background:linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,255,255,0.04));
  backdrop-filter:blur(14px);

  border:1px solid rgba(255,215,0,0.4);
  box-shadow:0 10px 50px rgba(255,215,0,0.2);

  opacity:0;
  transform:translateY(40px);
  transition:all 1s ease;
}

/* 🎬 SCROLL ANIMATION ACTIVE */
.card.show{
  opacity:1;
  transform:translateY(0);
}

.details{
  font-size:15px;
  line-height:1.9;
}

/* ⏳ COUNTDOWN */
.countdown{
  margin-top:15px;
  font-size:14px;
}

/* 🔘 GOLD BUTTONS */
.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:none;
  font-size:14px;
  font-weight:600;
  cursor:pointer;

  color:#000;
  background:linear-gradient(135deg,#ffd700,#ffcc00);

  box-shadow:0 5px 20px rgba(255,215,0,0.4);
}

.btn:active{transform:scale(0.95);}

/* 🎵 MUSIC BUTTON */
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ffd700;
  color:#000;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
  z-index:1000;
}

/* ✨ ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes shine{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

/* 📱 MOBILE */
@media (max-width:768px){
  .names{font-size:2rem;}
}
</style>
</head>

<body>

<div class="bg-fixed"></div>

<!-- 🎥 HERO -->
<div class="hero">
  <div class="top-names">
    <div class="names">Venu weds Sowmya</div>
    <div class="tagline">Together with love & blessings</div>
  </div>
</div>

<!-- 📦 CONTENT -->
<div class="content">

  <div class="card" id="card">
    <div class="details">
      📍 Thotapally<br>
      🗓 Sunday, May 10, 2026<br>
      ⏰ Muhurtham: 10:25 AM<br>
      ✨ Wedding Ceremony
    </div>

    <div class="countdown" id="countdown"></div>
  </div>

  <div class="actions">
    <button class="btn" onclick="openMap()">📍 Location</button>
    <button class="btn" onclick="shareWA()">📤 Share</button>
  </div>

</div>

<!-- 🎵 AUDIO -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-btn" onclick="toggleMusic()">🔊</div>

<script>
// 🎵 MUSIC AUTOPLAY (SMART)
let started=false;
function toggleMusic(){
  let audio=document.getElementById("bgm");
  if(audio.paused){
    audio.play();
  }else{
    audio.pause();
  }
}

window.addEventListener('click',()=>{
  if(!started){
    document.getElementById("bgm").play();
    started=true;
  }
},{once:true});

/* ⏳ COUNTDOWN */
let target=new Date("May 10, 2026 10:25:00").getTime();
setInterval(()=>{
 let d=target-Date.now();
 let days=Math.floor(d/(1000*60*60*24));
 let hrs=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let min=Math.floor((d%(1000*60*60))/(1000*60));
 document.getElementById("countdown").innerHTML=`⏳ ${days}d ${hrs}h ${min}m left`;
},1000);

/* 📍 */
function openMap(){
 window.open("https://maps.app.goo.gl/e5nKVW6cyCUn4xvr6?g_st=aw");
}

/* 📤 */
function shareWA(){
 window.open(`https://wa.me/?text=${encodeURIComponent(window.location.href)}`);
}

/* 🎬 SCROLL ANIMATION */
window.addEventListener("scroll",()=>{
 let card=document.getElementById("card");
 let pos=card.getBoundingClientRect().top;
 let screen=window.innerHeight;

 if(pos < screen - 100){
   card.classList.add("show");
 }
});
</script>

</body>
</html>
