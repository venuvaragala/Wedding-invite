<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venu weds Sowmya 💍</title>

<meta property="og:title" content="Venu weds Sowmya 💍">
<meta property="og:description" content="Together with love & blessings, we invite you to our wedding celebration.">
<meta property="og:image" content="https://venuvaragala.github.io/Wedding-invite/preview.jpg">
<meta property="og:url" content="https://venuvaragala.github.io/Wedding-invite/">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  color:#fff;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

/* 🔥 FIXED BACKGROUND (LIGHTWEIGHT) */
.bg-fixed{
  position:fixed;
  inset:0;
  background:url("background.jpg") center top / cover no-repeat;
  z-index:-2;
}

/* 🌫 LIGHT OVERLAY (LESS HEAVY) */
.bg-fixed::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
}

/* 🎥 HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

/* 💎 TITLE */
.top-names{
  margin-top:40px;
  text-align:center;
  padding:15px 25px;
  border-radius:15px;

  background:rgba(255,215,0,0.15);
  backdrop-filter: blur(6px);

  border:1px solid rgba(255,215,0,0.4);

  animation:fadeUp 1s ease;
}

/* ✨ TEXT */
.names{
  font-family:'Playfair Display', serif;
  font-size:2.1rem;

  background:linear-gradient(135deg,#ffd700,#fff,#ffd700);
  background-size:200%;
  -webkit-background-clip:text;
  color:transparent;

  animation:shine 5s linear infinite;
}

.tagline{
  font-size:12px;
  margin-top:5px;
}

/* 📦 CONTENT */
.content{
  padding:20px;
  text-align:center;
}

/* 💍 CARD */
.card{
  padding:18px;
  border-radius:18px;

  background:rgba(255,215,0,0.12);
  backdrop-filter: blur(6px);

  border:1px solid rgba(255,215,0,0.3);

  opacity:0;
  transform:translateY(30px);
  transition:0.8s ease;
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.details{
  font-size:15px;
  line-height:1.8;
}

/* ⏳ */
.countdown{
  margin-top:12px;
  font-size:14px;
}

/* 🔘 BUTTONS */
.actions{
  margin-top:15px;
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  font-size:14px;

  background:linear-gradient(135deg,#ffd700,#ffcc00);
  color:#000;
}

/* 🎵 BUTTON */
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ffd700;
  color:#000;
  padding:10px;
  border-radius:50%;
}

/* ✨ ANIMATIONS */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes shine{
  from{background-position:0%;}
  to{background-position:200%;}
}

/* 📱 MOBILE SMOOTH FIX */
@media (max-width:768px){

  .names{font-size:1.9rem;}

  .hero{
    height:100vh;
  }

  .content{
    margin-top:-30px;
  }

}
</style>
</head>

<body>

<div class="bg-fixed"></div>

<div class="hero">
  <div class="top-names">
    <div class="names">Venu weds Sowmya</div>
    <div class="tagline">Together with love & blessings</div>
  </div>
</div>

<div class="content">

  <div class="card" id="card">
    <div class="details">
      📍 Thotapally<br>
      🗓 Sunday, May 10, 2026<br>
      ⏰ Muhurtham: 10:25 AM<br>
      ✨ Wedding Ceremony
    </div>

    <div class="countdown" id="countdown"></div>
  </div>

  <div class="actions">
    <button class="btn" onclick="openMap()">📍 Location</button>
    <button class="btn" onclick="shareWA()">📤 Share</button>
  </div>

</div>

<audio id="bgm" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>
<div onclick="toggleMusic()" style="position:fixed;bottom:20px;right:20px;background:gold;padding:10px;border-radius:50%;">
🔊
</div>
<div class="music-btn" onclick="toggleMusic()">🔊</div>

<script>

  let audio = document.getElementById("bgm");
let started = false;

// autoplay after first interaction
function startMusic(){
  if(!started){
    audio.volume = 0.6;

    let playPromise = audio.play();

    if(playPromise !== undefined){
      playPromise.catch(()=>{}); // prevent error in browser
    }

    started = true;
  }
}

// trigger on interaction
["click","touchstart","scroll"].forEach(event=>{
  window.addEventListener(event, startMusic, {once:true});
});

// manual toggle
function toggleMusic(){
  if(audio.paused){
    audio.play();
  }else{
    audio.pause();
  }
}

  // 🚫 Disable right click
document.addEventListener("contextmenu", e => e.preventDefault());

// 🚫 Disable text selection
document.addEventListener("selectstart", e => e.preventDefault());

// 🚫 Disable drag (image saving)
document.addEventListener("dragstart", e => e.preventDefault());

// 🚫 Disable keyboard shortcuts
document.addEventListener("keydown", function(e){

  // Ctrl+C / Ctrl+U / Ctrl+S / Ctrl+A
  if(e.ctrlKey && ['c','u','s','a'].includes(e.key.toLowerCase())){
    e.preventDefault();
  }

  // F12 (dev tools)
  if(e.key === "F12"){
    e.preventDefault();
  }

});
  
/* 🎵 SMART MUSIC */
let started=false;
window.addEventListener('click',()=>{
 if(!started){
   document.getElementById("bgm").play();
   started=true;
 }
},{once:true});

function toggleMusic(){
 let a=document.getElementById("bgm");
 a.paused ? a.play() : a.pause();
}

/* ⏳ COUNTDOWN */
let target=new Date("May 10, 2026 10:25:00").getTime();
setInterval(()=>{
 let d=target-Date.now();
 let days=Math.floor(d/(1000*60*60*24));
 let hrs=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let min=Math.floor((d%(1000*60*60))/(1000*60));
 document.getElementById("countdown").innerHTML=`⏳ ${days}d ${hrs}h ${min}m`;
},1000);

/* 🎬 SCROLL */
window.addEventListener("scroll",()=>{
 let card=document.getElementById("card");
 if(card.getBoundingClientRect().top < window.innerHeight - 80){
   card.classList.add("show");
 }
});

/* ACTIONS */
function openMap(){
 window.open("https://maps.app.goo.gl/e5nKVW6cyCUn4xvr6?g_st=aw");
}

function shareWA(){
 window.open(`https://wa.me/?text=${encodeURIComponent(window.location.href)}`);
}
</script>

</body>
</html>
