<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venu weds Sowmya 💍</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  color:#fff;
  overflow-x:hidden;
  background:#000;
}

/* 🖼 HERO IMAGE */
.hero{
  height:100vh;
  width:100%;
  background:url("background.jpg") center top / cover no-repeat;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  position:relative;
}

/* 🌫 OVERLAY */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
}

/* 🔝 TOP TITLE */
.top-names{
  position:relative;
  z-index:2;
  margin-top:40px;
  text-align:center;
  padding:15px 25px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.08);
}

.names{
  font-size:2rem;
  font-weight:bold;
  letter-spacing:2px;
}

.tagline{
  font-size:12px;
  margin-top:5px;
  opacity:0.8;
}

/* 📦 CONTENT SECTION */
.content{
  padding:25px 20px;
  text-align:center;
}

/* 💍 DETAILS */
.details{
  font-size:15px;
  line-height:1.8;
}

/* ⏳ COUNTDOWN */
.countdown{
  margin-top:15px;
  font-size:14px;
}

/* 🔘 BUTTONS */
.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:25px;
  font-size:14px;
  cursor:pointer;
  font-weight:bold;
  color:#fff;
  background:linear-gradient(135deg,#ff7eb3,#65d6ff);
}

/* 📱 MOBILE PERFECT FLOW */
@media (max-width:768px){

  .hero{
    height:100vh;
  }

  .content{
    margin-top:-40px;
  }

}
</style>
</head>

<body>

<!-- 🖼 HERO -->
<div class="hero">
  <div class="top-names">
    <div class="names">Venu weds Sowmya</div>
    <div class="tagline">Together with love & blessings</div>
  </div>
</div>

<!-- 📦 SCROLL CONTENT -->
<div class="content">

  <div class="details">
    📍 Thotapally<br>
    🗓 Sunday, May 10, 2026<br>
    ⏰ Muhurtham: 10:25 AM<br>
    ✨ Wedding Ceremony
  </div>

  <div class="countdown" id="countdown"></div>

  <div class="actions">
    <button class="btn" onclick="openMap()">📍 Location</button>
    <button class="btn" onclick="shareWA()">📤 Share</button>
  </div>

</div>

<script>
// countdown
let target=new Date("May 10, 2026 10:25:00").getTime();
setInterval(()=>{
 let d=target-Date.now();
 let days=Math.floor(d/(1000*60*60*24));
 let hrs=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let min=Math.floor((d%(1000*60*60))/(1000*60));
 document.getElementById("countdown").innerHTML=`⏳ ${days}d ${hrs}h ${min}m left`;
},1000);

// actions
function openMap(){
 window.open("https://maps.app.goo.gl/e5nKVW6cyCUn4xvr6?g_st=aw");
}

function shareWA(){
 window.open(`https://wa.me/?text=${encodeURIComponent(window.location.href)}`);
}
</script>

</body>
</html>
